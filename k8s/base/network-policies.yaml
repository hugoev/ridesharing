# Zero-trust Network Policies.
# Default deny all, then allow only required traffic.

# ── Default deny all ingress ──────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: rideshare
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# ── Gateway: allow ingress from Ingress controller + Prometheus ──
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-ingress
  namespace: rideshare
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: gateway
  policyTypes:
    - Ingress
  ingress:
    # From Ingress controller (external traffic)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kong
      ports:
        - port: 8080
    # From Prometheus (metric scraping)
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - port: 8080
---
# ── CockroachDB: only from gateway and itself ─────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cockroachdb-ingress
  namespace: rideshare
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: cockroachdb
  policyTypes:
    - Ingress
  ingress:
    # From Gateway
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: gateway
      ports:
        - port: 26257
    # From other CockroachDB nodes (clustering)
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: cockroachdb
      ports:
        - port: 26257
        - port: 8080
---
# ── Redis: only from gateway ─────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-redis-ingress
  namespace: rideshare
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: gateway
      ports:
        - port: 6379
---
# ── Kafka: from gateway and zookeeper ─────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kafka-ingress
  namespace: rideshare
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: kafka
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: gateway
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: zookeeper
      ports:
        - port: 9092
---
# ── Zookeeper: from Kafka only ────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-zookeeper-ingress
  namespace: rideshare
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: zookeeper
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: kafka
      ports:
        - port: 2181
---
# ── Monitoring: allow internal monitoring traffic ─────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring-ingress
  namespace: rideshare
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/component
        operator: In
        values: ["monitoring", "tracing", "logging"]
  policyTypes:
    - Ingress
  ingress:
    # Grafana → Prometheus, Loki, Jaeger
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: grafana
    # Prometheus → all (scraping)
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
    # Ingress controller → monitoring UIs
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kong
    # Alertmanager ← Prometheus
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - port: 9093
    # Jaeger ← Gateway (OTLP traces)
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: gateway
      ports:
        - port: 4317
        - port: 4318
    # Loki ← Promtail
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: promtail
      ports:
        - port: 3100
