apiVersion: v1
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    # Route alerts to Alertmanager
    alerting:
      alertmanagers:
        - static_configs:
            - targets: ["alertmanager:9093"]

    # Load alerting and recording rules
    rule_files:
      - /etc/prometheus/rules/*.yml

    scrape_configs:
      # ──────────────────────────────────────
      # Application
      # ──────────────────────────────────────
      - job_name: "rideshare-gateway"
        metrics_path: /metrics
        scrape_interval: 10s
        static_configs:
          - targets: ["gateway:8080"]
            labels:
              service: "gateway"
              environment: "development"

      # ──────────────────────────────────────
      # Infrastructure — Self-monitoring
      # ──────────────────────────────────────
      - job_name: "prometheus"
        static_configs:
          - targets: ["localhost:9090"]

      - job_name: "alertmanager"
        static_configs:
          - targets: ["alertmanager:9093"]


      # ──────────────────────────────────────
      # Infrastructure — Host metrics
      # ──────────────────────────────────────
      - job_name: "node-exporter"
        scrape_interval: 15s
        static_configs:
          - targets: ["node-exporter:9100"]

      # ──────────────────────────────────────
      # Infrastructure — Loki metrics
      # ──────────────────────────────────────
      - job_name: "loki"
        static_configs:
          - targets: ["loki:3100"]
kind: ConfigMap
metadata:
  name: prometheus-config
