apiVersion: apps/v1
kind: Deployment
metadata:
  name: ride
  namespace: rideshare
  labels:
    app.kubernetes.io/name: ride
    app.kubernetes.io/component: api
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: ride
  # ── Zero-downtime rolling updates ──────────────────────────
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ride
        app.kubernetes.io/component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: ride
      terminationGracePeriodSeconds: 30

      # ── Spread pods across nodes ───────────────────────────
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values: ["ride"]
                topologyKey: kubernetes.io/hostname

      containers:
        - name: ride
          image: rideshare-ride:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 50051
              protocol: TCP

          # ── Environment from ConfigMap + Secrets ────────────
          envFrom:
            - configMapRef:
                name: ride-config
            - secretRef:
                name: ride-secrets

          # ── Resource requests and limits ────────────────────
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

          # ── Three-tier health checks ────────────────────────
          # Startup: allow up to 60s for first boot (DB migrations, etc.)
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 2
            failureThreshold: 30

          # Readiness: only receive traffic when healthy
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            successThreshold: 1
            failureThreshold: 3

          # Liveness: restart if unresponsive
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 15
            failureThreshold: 3

          # ── Security context ────────────────────────────────
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
