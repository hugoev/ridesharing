# Location secrets — PLACEHOLDER VALUES for development only.
# Production: use External Secrets Operator, Vault, or KMS.
apiVersion: v1
kind: Secret
metadata:
  name: location-secrets
  namespace: rideshare
  labels:
    app.kubernetes.io/name: location
type: Opaque
stringData:
  DATABASE_URL: "postgresql://rideshare:rideshare_secret@cockroachdb-public:26257/rideshare?sslmode=disable"
  JWT_SECRET: "k8s-dev-jwt-secret-change-in-prod"
