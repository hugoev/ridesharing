# PDB ensures at least 1 location pod is always available
# during voluntary disruptions (node drains, cluster upgrades).
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: location
  namespace: rideshare
  labels:
    app.kubernetes.io/name: location
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: location
