# PDB ensures at least 1 user pod is always available
# during voluntary disruptions (node drains, cluster upgrades).
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: user
  namespace: rideshare
  labels:
    app.kubernetes.io/name: user
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: user
