# PostgreSQL StatefulSet with persistent storage.
# Production: use CloudNativePG operator or managed RDS.
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: rideshare
data:
  POSTGRES_USER: rideshare
  POSTGRES_DB: rideshare
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: rideshare
type: Opaque
stringData:
  POSTGRES_PASSWORD: rideshare_secret
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: rideshare
  labels:
    app.kubernetes.io/name: postgres
spec:
  type: ClusterIP
  clusterIP: None  # Headless for StatefulSet
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: rideshare
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/component: database
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: postgres
          image: postgis/postgis:16-3.4
          ports:
            - containerPort: 5432
          envFrom:
            - configMapRef:
                name: postgres-config
            - secretRef:
                name: postgres-secret
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: migrations
              mountPath: /docker-entrypoint-initdb.d/migrations
              readOnly: true
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d/init-db.sh
              subPath: init-db.sh
              readOnly: true
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "rideshare"]
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "rideshare"]
            periodSeconds: 15
            failureThreshold: 5
      volumes:
        - name: migrations
          configMap:
            name: postgres-migrations
        - name: init-script
          configMap:
            name: postgres-init
            defaultMode: 0755
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
