# Gateway ServiceAccount — least-privilege identity for the API gateway pods.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gateway
  namespace: rideshare
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/component: api
---
# Monitoring ServiceAccount — shared by Prometheus, Grafana, etc.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: monitoring
  namespace: rideshare
  labels:
    app.kubernetes.io/name: monitoring
    app.kubernetes.io/component: observability
