# Kong API Gateway mapping to internal services.
# Assumes Kong Ingress Controller is installed in the cluster.
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: rate-limit-api
  namespace: rideshare
config:
  minute: 1000
  policy: local
plugin: rate-limiting
---
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: cors-api
  namespace: rideshare
config:
  origins: ["*"]
  methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
  headers: ["Accept", "Accept-Version", "Content-Length", "Content-MD5", "Content-Type", "Date", "Authorization"]
plugin: cors
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kongs-gateway-ingress
  namespace: rideshare
  annotations:
    konghq.com/plugins: rate-limit-api, cors-api
    konghq.com/strip-path: "false"
spec:
  ingressClassName: kong
  rules:
    - host: api.rideshare.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 8080
